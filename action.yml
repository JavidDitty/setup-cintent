name: "Setup CIntent"
description: "Set up your GitHub Actions job for CIntent."
author: "Javid Ditty"
branding:
  icon: "eye"
  color: "orange"
inputs:
  nonblocking:
    description: "Do not pause the python process when collecting samples"
    required: false
    default: "false"
  sample_rate:
    description: "Sampling rate per second (higher = more coverage, more overhead). Recommended: 100 (low), 1000 (balanced), 10000 (high)"
    required: false
    default: "1000"
  profiler:
    description: "Profiler to use: 'py-spy' (sampling, default), 'perf' (system-level sampling), 'uprobe' (eBPF tracing, 100% coverage), 'setprofile' (sys.setprofile, 100% coverage, no root)"
    required: false
    default: "py-spy"
runs:
  using: "composite"
  steps:
    - name: Set Environmental Variables
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        CINTENT_ARTIFACT_NAME="$(date +%s%N)-cintent_logs"
        echo "CINTENT_ARTIFACT_NAME=$CINTENT_ARTIFACT_NAME" >> $GITHUB_ENV

        CINTENT_BASH=/home/runner/cintent/bin/bash
        echo "CINTENT_BASH=$CINTENT_BASH" >> $GITHUB_ENV

        CINTENT_BIN=/home/runner/cintent/bin
        echo "CINTENT_BIN=$CINTENT_BIN" >> $GITHUB_ENV
        mkdir -p $CINTENT_BIN

        CINTENT_GETHOSTNAME=${{ github.action_path }}/tools/gethostname.bt
        echo "CINTENT_GETHOSTNAME=$CINTENT_GETHOSTNAME" >> $GITHUB_ENV

        CINTENT_LOGS=/home/runner/cintent/log
        echo "CINTENT_LOGS=$CINTENT_LOGS" >> $GITHUB_ENV
        mkdir -p $CINTENT_LOGS

        CINTENT_NONBLOCKING=${{ inputs.nonblocking }}
        echo "CINTENT_NONBLOCKING=$CINTENT_NONBLOCKING" >> $GITHUB_ENV

        CINTENT_SAMPLE_RATE=${{ inputs.sample_rate }}
        echo "CINTENT_SAMPLE_RATE=$CINTENT_SAMPLE_RATE" >> $GITHUB_ENV

        CINTENT_PROFILER_INPUT=${{ inputs.profiler }}
        CINTENT_PROFILER_NORMALIZED=$(echo "$CINTENT_PROFILER_INPUT" | tr '[:upper:]' '[:lower:]')
        case "$CINTENT_PROFILER_NORMALIZED" in
          "py-spy"|"py_spy"|"pyspy")
            CINTENT_PROFILER="py-spy"
            ;;
          "perf")
            CINTENT_PROFILER="perf"
            ;;
          "uprobe"|"ebpf"|"usdt")
            CINTENT_PROFILER="uprobe"
            ;;
          "setprofile"|"set_profile"|"set-profile"|"system.profile"|"system_profile"|"system-profile"|"systemprofile"|"sys.setprofile"|"sys_setprofile")
            CINTENT_PROFILER="setprofile"
            ;;
          *)
            echo "[cintent] Unsupported profiler '$CINTENT_PROFILER_INPUT'." >&2
            echo "[cintent] Supported values: py-spy, perf, uprobe, setprofile." >&2
            exit 1
            ;;
        esac
        echo "CINTENT_PROFILER_INPUT=$CINTENT_PROFILER_INPUT" >> $GITHUB_ENV
        echo "CINTENT_PROFILER=$CINTENT_PROFILER" >> $GITHUB_ENV
        CINTENT_SETPROFILE_ACTIVE=false
        echo "CINTENT_SETPROFILE_ACTIVE=$CINTENT_SETPROFILE_ACTIVE" >> $GITHUB_ENV

        CINTENT_PERF_TO_SPEEDSCOPE=${{ github.action_path }}/tools/perf_to_speedscope.py
        echo "CINTENT_PERF_TO_SPEEDSCOPE=$CINTENT_PERF_TO_SPEEDSCOPE" >> $GITHUB_ENV

        CINTENT_PYFUNCTIONS=${{ github.action_path }}/bin/pyfunctions
        echo "CINTENT_PYFUNCTIONS=$CINTENT_PYFUNCTIONS" >> $GITHUB_ENV

        CINTENT_PYPSNOOP=${{ github.action_path }}/tools/pypsnoop.bt
        echo "CINTENT_PYPSNOOP=$CINTENT_PYPSNOOP" >> $GITHUB_ENV

        CINTENT_PYPSNOOP_SH=${{ github.action_path }}/tools/pypsnoop.sh
        echo "CINTENT_PYPSNOOP_SH=$CINTENT_PYPSNOOP_SH" >> $GITHUB_ENV

        CINTENT_PYPSNOOP_UPROBE=${{ github.action_path }}/tools/pypsnoop_uprobe.bt
        echo "CINTENT_PYPSNOOP_UPROBE=$CINTENT_PYPSNOOP_UPROBE" >> $GITHUB_ENV

        CINTENT_SETPROFILE_SCRIPT=${{ github.action_path }}/tools/setprofile_profiler.py
        echo "CINTENT_SETPROFILE_SCRIPT=$CINTENT_SETPROFILE_SCRIPT" >> $GITHUB_ENV

        CINTENT_PYSPY=${{ github.action_path }}/bin/py-spy
        echo "CINTENT_PYSPY=$CINTENT_PYSPY" >> $GITHUB_ENV

        CINTENT_STEP_ID=0
        echo "CINTENT_STEP_ID=$CINTENT_STEP_ID" >> $GITHUB_ENV

        CINTENT_TCPLIFE=${{ github.action_path }}/tools/tcplife.bt
        echo "CINTENT_TCPLIFE=$CINTENT_TCPLIFE" >> $GITHUB_ENV

    - name: Install perf tools
      if: ${{ runner.os == 'Linux' && env.CINTENT_PROFILER == 'perf' }}
      shell: bash
      run: |
        # Install linux-tools for the running kernel, fall back to generic
        KERNEL_VER=$(uname -r)
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          linux-tools-${KERNEL_VER} \
          linux-tools-generic \
          linux-tools-common 2>/dev/null || \
        sudo apt-get install -y --no-install-recommends \
          linux-tools-generic \
          linux-tools-common
        # Relax kernel.perf_event_paranoid so perf can sample without cap_perfmon
        sudo sysctl -w kernel.perf_event_paranoid=1

    - name: Parse Python Functions
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        ${{ env.CINTENT_PYFUNCTIONS }} -o ${{ env.CINTENT_LOGS }} ${{ github.workspace }}

    - name: Write Bash Wrappers
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        # Save the current matrix configurations
        echo "${{ toJson(matrix) }}" > matrix_context.json
        CINTENT_MATRIX=$(cat matrix_context.json | tr -s '\n' ' ')
        echo "CINTENT_MATRIX=$CINTENT_MATRIX" >> $GITHUB_ENV

        # Write the bash wrapper
        cat << 'WRAPPER_EOF' > ${{ env.CINTENT_BASH }}
        #!/bin/bash
        if [[ -z "${CINTENT_IS_TRACING_BASH}" ]]; then
          # Set tracer indicator
          export CINTENT_IS_TRACING_BASH=true
          echo "CINTENT_IS_TRACING_BASH=$CINTENT_IS_TRACING_BASH" >> $GITHUB_ENV

          # Increment the step id
          CINTENT_STEP_ID=$((CINTENT_STEP_ID+1))
          echo "CINTENT_STEP_ID=$CINTENT_STEP_ID" >> "$GITHUB_ENV"
          
          # Define the log paths
          timestamp=$(date +%s%N)
          metadata_log=$CINTENT_LOGS/$timestamp.$CINTENT_STEP_ID.metadata.txt
          execsnoop_log=$CINTENT_LOGS/$timestamp.$CINTENT_STEP_ID.execsnoop.txt
          gethostname_log=$CINTENT_LOGS/$timestamp.$CINTENT_STEP_ID.gethostname.txt
          opensnoop_log=$CINTENT_LOGS/$timestamp.$CINTENT_STEP_ID.opensnoop.txt
          tcplife_log=$CINTENT_LOGS/$timestamp.$CINTENT_STEP_ID.tcplife.txt
          
          # Create the metadata log
          echo -en \
          "repository = $GITHUB_REPOSITORY\n"\
          "branch = $GITHUB_REF_NAME\n"\
          "commit = $GITHUB_SHA\n"\
          "workflow = ${GITHUB_WORKFLOW_REF%@*}\n"\
          "run_number = $GITHUB_RUN_NUMBER\n"\
          "run_attempt = $GITHUB_RUN_ATTEMPT\n"\
          "workspace = $GITHUB_WORKSPACE\n"\
          "job_id = $GITHUB_JOB\n"\
          "matrix = $CINTENT_MATRIX\n"\
          "profiler_requested = $CINTENT_PROFILER_INPUT\n"\
          "profiler = $CINTENT_PROFILER\n"\
          "step_id = $CINTENT_STEP_ID\n"\
          > "$metadata_log"
          sed -i 's/^[ ]*//' "$metadata_log"

          # Start snooping tools and pipe their outputs to their logs
          export BPFTRACE_MAX_STRLEN=200
          sudo --preserve-env=BPFTRACE_MAX_STRLEN bpftrace "${{ env.CINTENT_GETHOSTNAME }}" > "$gethostname_log" 2> /dev/null &
          sudo --preserve-env=BPFTRACE_MAX_STRLEN bpftrace "${{ env.CINTENT_TCPLIFE }}" > "$tcplife_log" 2> /dev/null &
          sudo --preserve-env=BPFTRACE_MAX_STRLEN,CINTENT_LOGS,CINTENT_NONBLOCKING,CINTENT_PERF_TO_SPEEDSCOPE,CINTENT_PROFILER,CINTENT_PYPSNOOP,CINTENT_PYPSNOOP_SH,CINTENT_PYPSNOOP_UPROBE,CINTENT_PYSPY,CINTENT_SAMPLE_RATE,CINTENT_SETPROFILE_ACTIVE,CINTENT_SETPROFILE_SCRIPT,CINTENT_STEP_ID bpftrace --unsafe "${{ env.CINTENT_PYPSNOOP }}" &> /dev/null &
          sudo execsnoop-bpfcc -qtx --max-args 100 > "$execsnoop_log" 2> /dev/null &
          sudo opensnoop-bpfcc -eT > "$opensnoop_log" 2> /dev/null &
          
          # Wait for snooping tools to start tracing (or timeout)
          timeout_time=60
          start_time=$SECONDS
          current_time=$((SECONDS - start_time))
          execsnoop_search='TIME\(s\)[[:space:]]+PCOMM[[:space:]]+PID[[:space:]]+PPID[[:space:]]+RET[[:space:]]+ARGS'
          opensnoop_search='TIME\(s\)[[:space:]]+PID[[:space:]]+COMM[[:space:]]+FD[[:space:]]+ERR[[:space:]]+FLAGS[[:space:]]+PATH'
          until grep -Eq "$execsnoop_search" "$execsnoop_log" && grep -Eq "$opensnoop_search" "$opensnoop_log" || [[ "$current_time" -gt "$timeout_time" ]]; do
            sleep 1
            current_time=$((SECONDS - start_time))
          done
          if ! grep -Eq "$execsnoop_search" "$execsnoop_log"; then
            echo "execsnoop failed to start!" 1>&2
            exit 1
          fi
          if ! grep -Eq "$opensnoop_search" "$opensnoop_log"; then
            echo "opensnoop failed to start!" 1>&2
            exit 1
          fi

          # (Re-)Apply the wrapper(s)
          export PATH="${{ env.CINTENT_BIN }}:$PATH"
          echo ${{ env.CINTENT_BIN }} >> $GITHUB_PATH

          # Setup sys.setprofile() if selected.
          # NOTE: PYTHONPROFILE is a Python 2 feature removed in Python 3.
          # We use sitecustomize.py + PYTHONPATH instead, which Python 3
          # automatically imports on every interpreter startup.
          _cintent_enable_setprofile() {
            _cintent_site="$CINTENT_LOGS/_site_$CINTENT_STEP_ID"
            mkdir -p "$_cintent_site"
            { printf 'import os, sys\n'
              printf '_s = os.environ.get("CINTENT_SETPROFILE_SCRIPT", "")\n'
              printf 'if _s and os.path.isfile(_s): exec(open(_s).read())\n'
            } > "$_cintent_site/sitecustomize.py"
            export CINTENT_SETPROFILE_SCRIPT="${{ env.CINTENT_SETPROFILE_SCRIPT }}"
            export CINTENT_PROFILE_LOG="$CINTENT_LOGS/$(date +%s%N).$CINTENT_STEP_ID.setprofile.csv"
            export CINTENT_SETPROFILE_ACTIVE=true
            export PYTHONPATH="$_cintent_site${PYTHONPATH:+:$PYTHONPATH}"
          }

          if [ "$CINTENT_PROFILER" == "setprofile" ]; then
            _cintent_enable_setprofile
            echo "[cintent] Using sys.setprofile() profiler via sitecustomize.py"
          fi

          # For uprobe profiler: verify USDT probe arguments are accessible in
          # the active Python binary BEFORE the step starts, so setprofile can
          # be activated as a fallback if they are not.
          #
          # Python 3.8 and 3.9 from the GitHub Actions toolcache are compiled
          # with incomplete SystemTap SDT notes: arg1 (funcname) and arg2
          # (lineno) location metadata is missing, so bpftrace fails with
          # "couldn't get argument 1".  Python 3.10+ toolcache and system
          # Python (/usr/bin/python3) do not have this problem.
          #
          # The check reads the .note.stapsdt ELF section and counts the
          # argument descriptors for the function__entry probe.  Each
          # descriptor contains an '@' (e.g. "8@-96(%rbp)"), so we count '@'.
          if [ "$CINTENT_PROFILER" == "uprobe" ]; then
            _cintent_need_fallback=0
            for _cintent_cmd in python python3; do
              _cintent_py=$(readlink -f "$(command -v "$_cintent_cmd" 2>/dev/null)" 2>/dev/null)
              [ -n "$_cintent_py" ] || continue
              _cintent_usdt_args=0
              if command -v readelf &>/dev/null && [ -f "$_cintent_py" ]; then
                _cintent_usdt_args=$(readelf -n "$_cintent_py" 2>/dev/null \
                  | awk '/Name: function__entry/{found=1} found && /Arguments:/{print; exit}' \
                  | grep -o '[^ ]*@[^ ]*' | wc -l | tr -d ' ')
              fi
              if [ "${_cintent_usdt_args:-0}" -lt 3 ]; then
                _cintent_need_fallback=1
                echo "[cintent] uprobe USDT args ${_cintent_usdt_args}/3 in $_cintent_py" >&2
              fi
            done
            if [ "$_cintent_need_fallback" -eq 1 ]; then
              # Activate setprofile via sitecustomize.py + PYTHONPATH.
              # PYTHONPROFILE was a Python 2 feature; Python 3 ignores it.
              _cintent_enable_setprofile
              echo "[cintent] uprobe fallback: setprofile via PYTHONPATH active" >&2
            fi
          fi

          # Start the bash script
          echo "start_time = $(date +%s)" >> $metadata_log
          /bin/bash "$@"
          echo "end_time = $(date +%s)" >> $metadata_log

          # (Re-)Apply the wrapper(s)
          export PATH="${{ env.CINTENT_BIN }}:$PATH"
          echo ${{ env.CINTENT_BIN }} >> $GITHUB_PATH

          # Unset tracer indicator
          unset CINTENT_IS_TRACING_BASH
          echo "CINTENT_IS_TRACING_BASH=" >> $GITHUB_ENV
        else
          # (Re-)Apply the wrapper(s)
          export PATH="${{ env.CINTENT_BIN }}:$PATH"
          echo ${{ env.CINTENT_BIN }} >> $GITHUB_PATH

          # Start the bash script
          /bin/bash "$@"

          # (Re-)Apply the wrapper(s)
          export PATH="${{ env.CINTENT_BIN }}:$PATH"
          echo ${{ env.CINTENT_BIN }} >> $GITHUB_PATH
        fi
        WRAPPER_EOF
        chmod +x ${{ env.CINTENT_BASH }}

    - name: Apply Wrappers
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        export PATH="${{ env.CINTENT_BIN }}:$PATH"
        echo ${{ env.CINTENT_BIN }} >> $GITHUB_PATH
